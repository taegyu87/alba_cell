<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alba 구역">
<meta name="theme-color" content="#0f1923">
<title>Alba 봉사구역 뷰어</title>
<style>
  :root {
    --bg: #0f1923;
    --surface: #162030;
    --surface2: #1e2d3d;
    --border: #2a3f54;
    --accent: #3b82f6;
    --accent2: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --row-red: #3b1a1a;
    --row-green: #0f2a1e;
    --row-yellow: #2a2010;
    --row-gray: #1a2030;
    --tag-out: #7f1d1d;
    --tag-ok: #14532d;
    --tag-warn: #78350f;
    --sidebar-w: 380px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 툴바 ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #toolbar h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: .5px;
    white-space: nowrap;
  }
  .tb-sep { width:1px; height:24px; background:var(--border); }
  #toolbar label { font-size:13px; color:var(--text2); white-space:nowrap; }
  #months-input {
    width: 52px;
    padding: 4px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    text-align: center;
  }
  .btn {
    padding: 5px 14px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 600;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-blue  { background: var(--accent); color:#fff; }
  .btn-green { background: var(--accent2); color:#fff; }
  .btn-preset {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 5px 11px;
    font-size: 12px;
  }
  .btn-preset:hover { background: var(--border); color: var(--text); opacity: 1; }
  .btn-preset.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #preset-group { display: flex; gap: 5px; flex-wrap: wrap; }
  #stat { margin-left:auto; font-size:12px; color:var(--text3); white-space:nowrap; }

  /* ── 메인 레이아웃 ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 사이드바 (구역 목록) ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: 260px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    resize: horizontal;
    overflow: auto;
  }
  #sidebar-header {
    padding: 10px 12px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #sidebar-header h2 { font-size:13px; color:var(--text2); margin-bottom:8px; font-weight:600; }
  #search {
    width: 100%;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
  }
  #search:focus { outline:none; border-color:var(--accent); }

  /* 구역 테이블 헤더 */
  #t-head {
    display: grid;
    grid-template-columns: 70px 1fr 56px 42px 70px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--text3);
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    letter-spacing: .4px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  #t-list { flex:1; overflow-y:auto; }
  .t-row {
    display: grid;
    grid-template-columns: 70px 1fr 56px 42px 70px;
    padding: 7px 10px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,.04);
    font-size: 12px;
    align-items: center;
    transition: background .1s;
    gap: 2px;
  }
  .t-row:hover { background: var(--surface2); }
  .t-row.selected { background: #1d3557 !important; outline: 2px solid var(--accent); outline-offset: -2px; }
  .t-row.tag-out  { background: #2a1010; }
  .t-row.tag-warn { background: #2a1e08; }
  .t-row.tag-ok   { background: #0a2018; }
  .t-name { font-weight:700; color:var(--text); font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .t-area { color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:11.5px; }
  .t-uv   { text-align:center; font-weight:700; font-size:12px; }
  .t-uv.has-uv { color: var(--red); }
  .t-uv.no-uv  { color: var(--accent2); }
  .t-total{ text-align:center; color:var(--text3); font-size:11.5px; }
  .t-st   { text-align:center; font-size:11px; white-space:nowrap; }
  .badge  { display:inline-block; padding:2px 6px; border-radius:4px; font-size:10.5px; font-weight:700; }
  .badge-out  { background: #7f1d1d; color:#fca5a5; }
  .badge-ok   { background: #14532d; color:#6ee7b7; }

  /* ── 오른쪽 패널 ── */
  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }
  #content-header {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #content-header h2 { font-size:14px; font-weight:700; color:var(--text); }
  #content-header p  { font-size:12px; color:var(--text2); margin-top:3px; }

  /* 집 테이블 */
  #h-table-wrap { flex:1; overflow:auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--surface2);
    padding: 8px 10px;
    text-align: left;
    font-size: 11px;
    color: var(--text3);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,.04);
    cursor: pointer;
    transition: filter .1s;
  }
  tbody tr:hover { filter: brightness(1.3); }
  tbody tr.selected-row { outline: 2px solid var(--accent); outline-offset: -2px; }
  tbody td { padding: 7px 10px; vertical-align: top; }
  tr.row-red    { background: var(--row-red); }
  tr.row-green  { background: var(--row-green); }
  tr.row-yellow { background: var(--row-yellow); }
  tr.row-gray   { background: var(--row-gray); color:var(--text3); }
  .td-mk   { text-align:center; font-weight:700; color:var(--accent); width:40px; }
  .td-addr { max-width:260px; }
  .td-dt   { text-align:center; white-space:nowrap; width:88px; font-size:12px; }
  .td-st   { text-align:center; width:78px; white-space:nowrap; }
  .td-note { color:var(--text2); font-size:12px; max-width:360px; }
  .st-badge { padding:2px 6px; border-radius:3px; font-size:10.5px; font-weight:700; }
  .st-new   { background:#1d3a5e; color:#93c5fd; }
  .st-valid { background:#14532d; color:#6ee7b7; }
  .st-dnc   { background:#374151; color:#9ca3af; }

  /* 노트 패널 */
  #note-panel {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 10px 14px;
    max-height: 130px;
  }
  #note-panel h3 { font-size:11px; color:var(--text3); font-weight:700; text-transform:uppercase; letter-spacing:.4px; margin-bottom:6px; }
  #note-content  { font-size:13px; color:var(--text2); line-height:1.6; overflow-y:auto; max-height:90px; white-space:pre-wrap; word-break:break-all; }

  /* 스크롤바 */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text3); }

  /* 빈 상태 */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    font-size: 14px;
    flex-direction: column;
    gap: 8px;
  }
  .empty-state span { font-size: 36px; }

  /* 파일 드롭 오버레이 */
  #drop-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(59,130,246,.15);
    border: 3px dashed var(--accent);
    z-index: 999;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--accent);
    font-weight: 700;
  }
  #drop-overlay.active { display:flex; }
</style>
<style>
/* ── 모바일 탭 ── */
#mobile-tabs {
  display: none;
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
#mobile-tabs button {
  flex: 1;
  padding: 12px 8px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
#mobile-tabs button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── 모바일 뒤로가기 버튼 ── */
#mobile-back {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}

@media (max-width: 700px) {
  /* 툴바 모바일 */
  #toolbar {
    padding: 8px 12px;
    gap: 8px;
  }
  #toolbar h1 { font-size: 13px; }
  #stat { font-size: 11px; }
  .btn { padding: 7px 12px; font-size: 12px; }
  .btn-preset { padding: 6px 9px; font-size: 11px; }
  #preset-group { gap: 4px; }
  #months-input { width: 46px; }

  /* 탭 표시 */
  #mobile-tabs { display: flex; }

  /* 메인 레이아웃 - 세로 스택 */
  #main {
    flex-direction: column;
    position: relative;
  }

  /* 사이드바 전체 너비 */
  #sidebar {
    width: 100% !important;
    min-width: unset;
    border-right: none;
    border-bottom: 1px solid var(--border);
    resize: none;
    max-height: 100%;
    flex-shrink: 0;
  }

  /* 오른쪽 패널 */
  #content {
    width: 100%;
  }

  /* 패널 토글 (JS로 .hidden 추가/제거) */
  #sidebar.mobile-hidden { display: none; }
  #content.mobile-hidden { display: none; }
  #mobile-back { display: flex; }
  #mobile-back.mobile-hidden { display: none; }

  /* 구역 목록 행 - 더 크게 */
  .t-row {
    padding: 10px 10px;
    font-size: 13px;
    grid-template-columns: 65px 1fr 50px 38px 66px;
  }
  .t-name { font-size: 13px; }
  .t-area { font-size: 12px; }

  /* 집 테이블 - 모바일 스크롤 */
  #h-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 480px; font-size: 12px; }
  thead th { padding: 8px 8px; font-size: 10.5px; }
  tbody td  { padding: 9px 8px; }

  /* 노트 패널 */
  #note-panel { max-height: 120px; }
  #note-content { font-size: 12.5px; max-height: 80px; }

  /* 컨텐츠 헤더 */
  #content-header h2 { font-size: 13px; }
  #content-header p  { font-size: 11.5px; }

  /* 드롭 오버레이 - 모바일 숨김 */
  #drop-overlay { display: none !important; }

  /* 검색 입력 */
  #search { font-size: 14px; padding: 8px 10px; }

  /* 사이드바 헤더 */
  #sidebar-header { padding: 8px 10px 6px; }

  /* 잠금화면 패딩 */
  #lock { padding: 24px 16px; }
  .lock-title { font-size: 18px; }
  .lock-box { padding: 20px 16px; }
}

/* ── 잠금화면 ── */
#lock{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.lock-ico{font-size:56px;margin-bottom:16px;}
.lock-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;}
.lock-sub{font-size:13px;color:var(--text3);margin-bottom:36px;}
.lock-box{width:100%;max-width:320px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px 22px;display:flex;flex-direction:column;gap:14px;}
.lock-label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
#pw-input{width:100%;padding:14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:20px;font-family:inherit;text-align:center;letter-spacing:6px;-webkit-appearance:none;outline:none;transition:border-color .2s;}
#pw-input:focus{border-color:var(--accent);}
#pw-btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .15s;}
#pw-btn:active{opacity:.75;}
#pw-err{text-align:center;font-size:13px;color:var(--red);min-height:18px;}
#pw-loading{text-align:center;font-size:12px;color:var(--text3);min-height:18px;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.shake{animation:shake .35s ease;}
/* ── 정렬 ── */
.sort-btn{cursor:pointer;user-select:none;white-space:nowrap;padding:2px 4px;border-radius:4px;transition:background .15s;}
.sort-btn:hover{background:rgba(255,255,255,.08);}
.sort-btn span{font-size:9px;color:var(--accent);margin-left:2px;}
</style>
</head>

    </div>
    <div id="t-head">
      <span class="sort-btn" onclick="sortBy('name')">구역명 <span id="si-name"></span></span>
      <span class="sort-btn" onclick="sortBy('area')">지역 <span id="si-area"></span></span>
      <span class="sort-btn" onclick="sortBy('uv')"   style="text-align:center">미방문 <span id="si-uv"></span></span>
      <span class="sort-btn" onclick="sortBy('total')" style="text-align:center">전체 <span id="si-total"></span></span>
      <span class="sort-btn" onclick="sortBy('status')" style="text-align:center">상태 <span id="si-status"></span></span>
    </div>
    <div id="t-list"></div>
  </div>

  <!-- 오른쪽 -->
  <div id="content">
    <div id="content-header">
      <h2 id="ch-title">← 왼쪽에서 구역을 선택하세요</h2>
      <p id="ch-sub"></p>
    </div>
    <div id="h-table-wrap">
      <div class="empty-state" id="empty-msg">
        <span>🏘</span>구역을 선택하면 집 목록이 표시됩니다
      </div>
      <table id="h-table" style="display:none">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>주소</th>
            <th style="width:88px;text-align:center">마지막 방문</th>
            <th style="width:80px;text-align:center">상태</th>
            <th>노트 요약</th>
          </tr>
        </thead>
        <tbody id="h-body"></tbody>
      </table>
    </div>
    <div id="note-panel">
      <h3>선택한 집 — 전체 노트</h3>
      <div id="note-content" style="color:var(--text3);font-style:italic">집을 클릭하면 노트가 표시됩니다</div>
    </div>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script>
// ═══════════════════════════════════════
// 비밀번호 & 복호화
// ═══════════════════════════════════════
const _H = "65e82bfd8c365477adafa610bdf5cc48d4127eaa391cb5aa33ddcdd0f06e61cc";
let failCount = 0, lockUntil = 0;

async function checkPW() {
  const now = Date.now();
  if (now < lockUntil) {
    const sec = Math.ceil((lockUntil-now)/1000);
    showPwErr('잠시 후 다시 시도하세요 ('+sec+'초)'); return;
  }
  const input = document.getElementById('pw-input').value;
  const buf   = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
  const hash  = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hash === _H) {
    document.getElementById('pw-loading').textContent = '🔓 데이터 불러오는 중...';
    document.getElementById('pw-btn').disabled = true;
    try {
      await loadData(input);
      document.getElementById('lock').style.display = 'none';
      document.getElementById('app').style.display  = 'flex';
      failCount = 0;
      initApp();
    } catch(e) {
      showPwErr('오류: ' + e.message);
      document.getElementById('pw-loading').textContent = '';
      document.getElementById('pw-btn').disabled = false;
    }
  } else {
    failCount++;
    document.getElementById('pw-input').value = '';
    const box = document.querySelector('.lock-box');
    box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake');
    if (failCount >= 5) {
      lockUntil = Date.now()+30000;
      showPwErr('5회 오류 — 30초 후 재시도'); failCount=0;
    } else showPwErr('비밀번호가 틀렸습니다 ('+failCount+'/5)');
  }
}
function showPwErr(msg) {
  const el = document.getElementById('pw-err');
  el.textContent = msg;
  setTimeout(()=>{ if(el.textContent===msg) el.textContent=''; }, 3500);
}
document.getElementById('pw-input').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPW(); });

// ── XOR 복호화 ──────────────────────────
async function xorDecrypt(b64, password) {
  const keyBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
  const key    = new Uint8Array(keyBuf);
  const comp   = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const out    = new Uint8Array(comp.length);
  for (let i=0; i<comp.length; i++) out[i] = comp[i] ^ key[i%32];
  return JSON.parse(pako.inflate(out, {to:'string'}));
}

// ── alba_data.html 로드 ─────────────────
async function loadData(password) {
  const urls = ['alba_data.html', './alba_data.html'];
  for (const url of urls) {
    try {
      const r = await fetch(url+'?t='+Date.now());
      if (!r.ok) continue;
      const html = await r.text();
      const m1 = html.match(/const ALBA_ENC = "([^"]+)"/);
      const m2 = html.match(/const ALBA_DATE = "([^"]+)"/);
      const m3 = html.match(/const ALBA_STATS = "([^"]+)"/);
      if (!m1) continue;
      const territories = await xorDecrypt(m1[1], password);
      TERRITORIES.length = 0;
      territories.forEach(t=>TERRITORIES.push(t));
      const stats = m3 ? m3[1].split('|') : [territories.length, '?'];
      const date  = m2 ? m2[1] : '';
      document.getElementById('stat').textContent =
        `🔐 암호화 데이터 | ${stats[0]}개 구역 · ${stats[1]}개 집 | ${date}`;
      return;
    } catch(e) { continue; }
  }
  throw new Error('alba_data.html 을 찾을 수 없어요. GitHub Pages에 업로드됐는지 확인해주세요.');
}

// ═══════════════════════════════════════
// 데이터 & 상태
// ═══════════════════════════════════════
const TERRITORIES = [];
let sortKey = 'uv', sortAsc = false;

function sortBy(key) {
  if (sortKey===key) { sortAsc=!sortAsc; }
  else { sortKey=key; sortAsc=(key==='name'||key==='area'); }
  updateSortIcons(); renderList();
}
function updateSortIcons() {
  ['name','area','uv','total','status'].forEach(k=>{
    const el=document.getElementById('si-'+k);
    if(el) el.textContent=(k===sortKey)?(sortAsc?'▲':'▼'):'';
  });
}
function applySort(list) {
  return [...list].sort((a,b)=>{
    let va,vb;
    if(sortKey==='name')  {va=a.name; vb=b.name;}
    else if(sortKey==='area')  {va=a.area; vb=b.area;}
    else if(sortKey==='total') {va=a.total;vb=b.total;}
    else if(sortKey==='status'){va=a.signed_out?1:0;vb=b.signed_out?1:0;}
    else {va=countUnvisited(a,months);vb=countUnvisited(b,months);}
    if(typeof va==='string') return sortAsc?va.localeCompare(vb,'ko'):vb.localeCompare(va,'ko');
    return sortAsc?va-vb:vb-va;
  });
}

// ── 모바일 패널 전환 ─────────────────────
function showMobilePanel(panel) {
  const isMobile = window.innerWidth <= 700;
  if (!isMobile) return;
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('content');
  const back    = document.getElementById('mobile-back');
  const tabList = document.getElementById('tab-list');
  const tabDet  = document.getElementById('tab-detail');
  if (panel === 'list') {
    sidebar.classList.remove('mobile-hidden');
    content.classList.add('mobile-hidden');
    back.classList.add('mobile-hidden');
    tabList.classList.add('active');
    tabDet.classList.remove('active');
  } else {
    sidebar.classList.add('mobile-hidden');
    content.classList.remove('mobile-hidden');
    back.classList.remove('mobile-hidden');
    tabList.classList.remove('active');
    tabDet.classList.add('active');
  }
}

// ═══════════════════════════════════════
// 원본 뷰어 함수들
// ═══════════════════════════════════════
// ── 상태 ─────────────────────────────────
let months = 3;
let selectedTIdx = null;
let selectedHIdx = null;
let filteredList = [];

// ── 날짜 유틸 ────────────────────────────
function monthsAgo(dateStr) {
  if (!dateStr) return Infinity;
  const d = new Date(dateStr);
  const t = new Date();
  return (t.getFullYear() - d.getFullYear()) * 12 + (t.getMonth() - d.getMonth());
}
function fmtDate(dateStr) {
  if (!dateStr) return '기록없음';
  const [y, m, d] = dateStr.split('-');
  return `${y.slice(2)}/${m}/${d}`;
}

// ── 미방문 수 계산 ────────────────────────
function countUnvisited(t, mo) {
  return t.houses.filter(h =>
    !h.dnc && (monthsAgo(h.last_date) >= mo)
  ).length;
}

// ── 구역 목록 렌더 ────────────────────────
function renderList() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filteredList = TERRITORIES.filter(t =>
    !q || t.name.toLowerCase().includes(q) || t.area.toLowerCase().includes(q)
  );

  const container = document.getElementById('t-list');
  container.innerHTML = '';

  filteredList = applySort(filteredList);
  filteredList.forEach((t, fi) => {
    const uv   = countUnvisited(t, months);
    const orig = TERRITORIES.indexOf(t);
    const row  = document.createElement('div');

    let tagCls = t.signed_out ? 'tag-out' : (uv > 0 ? 'tag-warn' : 'tag-ok');
    if (orig === selectedTIdx) tagCls += ' selected';

    row.className = `t-row ${tagCls}`;
    row.dataset.orig = orig;

    const stBadge = t.signed_out
      ? `<span class="badge badge-out">반출중</span>`
      : `<span class="badge badge-ok">가능</span>`;
    const uvHtml = uv > 0
      ? `<span class="t-uv has-uv">🔴 ${uv}</span>`
      : `<span class="t-uv no-uv">✅ 0</span>`;

    row.innerHTML = `
      <span class="t-name" title="${t.name}">${t.name}</span>
      <span class="t-area" title="${t.area}">${t.area}</span>
      ${uvHtml}
      <span class="t-total">${t.total}</span>
      <span class="t-st">${stBadge}</span>
    `;
    row.onclick = () => selectTerritory(orig);
    container.appendChild(row);
  });
}

// ── 구역 선택 ────────────────────────────
function selectTerritory(idx) {
  selectedTIdx = idx;
  selectedHIdx = null;
  renderList();

  const t = TERRITORIES[idx];
  document.getElementById('ch-title').textContent =
    `${t.name}  |  ${t.area}  |  총 ${t.total}집`;

  let sub = '';
  if (t.completed) sub += `마지막 완료: ${t.completed}`;
  if (t.signed_out) sub += (sub ? '  |  ' : '') + `🔴 반출: ${t.signed_out_by}`;
  const uv = countUnvisited(t, months);
  sub += (sub ? '  |  ' : '') + `미방문 ${uv}집 / 전체 ${t.houses.length}집`;
  document.getElementById('ch-sub').textContent = sub;

  document.getElementById('empty-msg').style.display = 'none';
  document.getElementById('h-table').style.display = 'table';

  renderHouses(t);
  document.getElementById('note-content').textContent = '집을 클릭하면 노트가 표시됩니다';
  document.getElementById('note-content').style.color = 'var(--text3)';
  document.getElementById('note-content').style.fontStyle = 'italic';
  // 모바일: 구역 선택 시 자동으로 집 목록 패널로 전환
  showMobilePanel('detail');
}

// ── 집 목록 렌더 ─────────────────────────
function renderHouses(t) {
  const tbody = document.getElementById('h-body');
  tbody.innerHTML = '';

  t.houses.forEach((h, j) => {
    const mo = monthsAgo(h.last_date);
    let rowCls = '';
    let dtTxt  = fmtDate(h.last_date);
    let dtStyle = '';

    if (h.dnc || h.status === 'Do not call') {
      rowCls = 'row-gray'; dtTxt = '방문금지';
    } else if (!h.last_date) {
      rowCls = 'row-yellow';
    } else if (mo >= months) {
      rowCls = 'row-red';
      dtStyle = 'color:#fca5a5;font-weight:700';
    } else {
      rowCls = 'row-green';
      dtStyle = 'color:#6ee7b7';
    }

    const stCls = h.status === 'Valid' ? 'st-valid'
                : (h.dnc || h.status === 'Do not call') ? 'st-dnc' : 'st-new';

    const noteShort = (h.notes || '').replace(/\n/g,' ').slice(0, 90);

    const tr = document.createElement('tr');
    tr.className = rowCls;
    tr.dataset.idx = j;
    tr.innerHTML = `
      <td class="td-mk">${h.marker}</td>
      <td class="td-addr">${esc(h.address)}</td>
      <td class="td-dt" style="${dtStyle}">${dtTxt}</td>
      <td class="td-st"><span class="st-badge ${stCls}">${h.status || '-'}</span></td>
      <td class="td-note">${esc(noteShort)}</td>
    `;
    tr.onclick = () => selectHouse(j);
    tbody.appendChild(tr);
  });
}

// ── 집 선택 ──────────────────────────────
function selectHouse(j) {
  // 이전 선택 해제
  document.querySelectorAll('#h-body tr.selected-row').forEach(r => r.classList.remove('selected-row'));
  const rows = document.querySelectorAll('#h-body tr');
  if (rows[j]) rows[j].classList.add('selected-row');

  const t = TERRITORIES[selectedTIdx];
  const h = t.houses[j];
  const nc = document.getElementById('note-content');
  nc.style.color = 'var(--text2)';
  nc.style.fontStyle = 'normal';
  nc.textContent = h.notes || '(노트 없음)';
}

// ── 프리셋 개월수 ────────────────────────
function setPresetMonths(m) {
  document.getElementById('months-input').value = m;
  // active 스타일
  document.querySelectorAll('#preset-group .btn-preset').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.textContent) === m);
  });
  applyMonths();
}

// ── 개월수 적용 ──────────────────────────
function applyMonths() {
  months = parseFloat(document.getElementById('months-input').value) || 3;
  renderList();
  if (selectedTIdx !== null) {
    const t = TERRITORIES[selectedTIdx];
    const uv = countUnvisited(t, months);
    let sub = document.getElementById('ch-sub').textContent;
    // 미방문 수 업데이트
    sub = sub.replace(/미방문 \d+집/, `미방문 ${uv}집`);
    document.getElementById('ch-sub').textContent = sub;
    renderHouses(t);
  }
}
document.getElementById('months-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') applyMonths();
});

// ── 파일 열기 ────────────────────────────
function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseAndLoad(e.target.result, file.name);
  reader.readAsText(file, 'utf-8');
  input.value = '';
}

function parseAndLoad(html, fname) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const cards = doc.querySelectorAll('div.card');
    const result = [];

    cards.forEach(card => {
      const h1s = card.querySelectorAll('h1');
      let h1 = null;
      for (const h of h1s) { if (h.querySelector('strong')) { h1 = h; break; } }
      if (!h1) return;

      const name = h1.querySelector('strong').textContent.trim();
      const mutedEl = h1.querySelector('.muted');
      const area = mutedEl ? mutedEl.textContent.trim() : '';

      const info = [...card.querySelectorAll('p')].map(p=>p.textContent).join(' ');
      const am = info.match(/(\d+)\s+addresses/);
      const total = am ? parseInt(am[1]) : 0;
      const cm = info.match(/Last completed (.+?)\./);
      const completed = cm ? cm[1].trim() : '';
      const signed_out = info.includes('Signed out');
      const sm = info.match(/Signed out by (.+?)(?:\.|,|\n|$)/);
      const signed_out_by = sm ? sm[1].trim() : '';

      const houses = [];
      const tbody = card.querySelector('table.addresses tbody');
      if (tbody) {
        tbody.querySelectorAll('tr').forEach(row => {
          const tds = row.querySelectorAll('td');
          if (tds.length < 6) return;
          const mkS = tds[0].querySelector('strong');
          const marker = mkS ? mkS.textContent.trim() : '';
          const stS = tds[2].querySelector('strong');
          const status = stS ? stS.textContent.trim() : '';
          const dnc = !!tds[4].querySelector('strike');
          const address = tds[4].textContent.trim();
          const notes = tds[5].textContent.trim();
          const ds = parseDatesJS(notes);
          const last_date = ds.length ? ds.reduce((a,b)=>a>b?a:b) : null;
          houses.push({marker, address, status, dnc, notes, last_date});
        });
      }
      result.push({name, area, total, completed, signed_out, signed_out_by, houses});
    });

    // 전역 데이터 교체
    TERRITORIES.length = 0;
    result.forEach(t => TERRITORIES.push(t));
    selectedTIdx = null;
    selectedHIdx = null;
    document.getElementById('stat').textContent =
      `${result.length}개 구역 로드됨 | ${fname}`;
    document.getElementById('empty-msg').style.display = 'flex';
    document.getElementById('h-table').style.display = 'none';
    document.getElementById('ch-title').textContent = '← 왼쪽에서 구역을 선택하세요';
    document.getElementById('ch-sub').textContent = '';
    document.getElementById('search').value = '';
    renderList();
  } catch(e) {
    alert('파일 파싱 오류: ' + e.message);
  }
}

function parseDatesJS(text) {
  const results = [];
  const re = /(\d{1,2})\/(\d{1,2})\/(\d{2,4})/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const a=parseInt(m[1]), b=parseInt(m[2]), c=parseInt(m[3]);
    const yr = c > 100 ? c : 2000+c;
    if (a>=1&&a<=12&&b>=1&&b<=31) {
      try { const d=new Date(yr,a-1,b); if(!isNaN(d)) results.push(d.toISOString().slice(0,10)); } catch(e){}
    }
    if (a>=21&&a<=30&&b>=1&&b<=12&&c>=1&&c<=31) {
      try { const d=new Date(2000+a,b-1,c); if(!isNaN(d)) results.push(d.toISOString().slice(0,10)); } catch(e){}
    }
  }
  return results;
}

// ── 드래그 앤 드롭 ───────────────────────
const overlay = document.getElementById('drop-overlay');
document.addEventListener('dragover', e => { e.preventDefault(); overlay.classList.add('active'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) overlay.classList.remove('active'); });
document.addEventListener('drop', e => {
  e.preventDefault();
  overlay.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.html')) {
    const reader = new FileReader();
    reader.onload = ev => parseAndLoad(ev.target.result, file.name);
    reader.readAsText(file, 'utf-8');
  }
});

// ── HTML 이스케이프 ──────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 초기 로드 ────────────────────────────


function initApp() {
  updateSortIcons();
  renderList();
}
</script>
</body>
